services:
  backend:
    build:
      context: ./backend
    image: ${COMPOSE_PROJECT_NAME:-my-lawn-monitor}-backend:${APP_ENV:-production}
    env_file:
      - ./backend/.env.${APP_ENV:-production}
    depends_on:
      - mongo
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: ${BACKEND_PORT:-4000}
    ports:
      - "${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: ${COMPOSE_PROJECT_NAME:-my-lawn-monitor}-frontend:${APP_ENV:-production}
    env_file:
      - ./frontend/.env.${APP_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-my_lawn_monitor}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
